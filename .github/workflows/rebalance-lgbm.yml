name: Paper Trade Rebalance (LightGBM)

on:
  schedule:
    # 15:10 UTC = 11:10 ET (EDT) / 10:10 ET (EST) — mid-morning in both DST
    # regimes, and staggered 10 min behind rebalance.yml so the two workflows
    # don't race each other's state pushes to main.
    # (History: moved earlier from 18:00 UTC because GH Actions scheduler
    # delay, often 2h+, was pushing runs past the 16:00 ET close.)
    - cron: '10 15 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'live'
        type: choice
        options:
          - live
          - dry-run
          - dry-run-force
          - status

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # Restore state from previous runs
      - name: Restore trade state
        uses: actions/cache/restore@v4
        with:
          path: logs/paper_trade_lgbm_state.json
          key: trade-state-lgbm-${{ github.run_number }}
          restore-keys: trade-state-lgbm-

      - name: Ensure logs directory
        run: mkdir -p logs

      # Determine run flags
      - name: Set run flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            MODE="live"
          fi
          case "$MODE" in
            dry-run)       echo "args=--dry-run"         >> "$GITHUB_OUTPUT" ;;
            # Full pipeline smoke test: computes the target portfolio and
            # previews trades even when a rebalance is not due; never submits.
            dry-run-force) echo "args=--dry-run --force" >> "$GITHUB_OUTPUT" ;;
            status)        echo "args=--status"          >> "$GITHUB_OUTPUT" ;;
            *)             echo "args="                  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run paper_trade_lgbm.py
        run: python paper_trade_lgbm.py ${{ steps.flags.outputs.args }}
        env:
          PYTHONPATH: .
          ALPACA_LGBM_API_KEY: ${{ secrets.ALPACA_LGBM_API_KEY }}
          ALPACA_LGBM_SECRET_KEY: ${{ secrets.ALPACA_LGBM_SECRET_KEY }}

      # Persist state for next run
      - name: Save trade state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/paper_trade_lgbm_state.json
          key: trade-state-lgbm-${{ github.run_number }}

      # Commit updated trade logs and state back to repo
      - name: Commit trade logs
        if: github.event.inputs.mode != 'dry-run' && github.event.inputs.mode != 'dry-run-force' && github.event.inputs.mode != 'status'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f logs/paper_trade_lgbm_state.json logs/trade_events.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update lgbm trade state after rebalance [skip ci]"
            # The v3 workflow may have pushed its own state commit in the
            # meantime; rebase our commit on top instead of failing the push.
            git pull --rebase origin main
            git push
          fi
