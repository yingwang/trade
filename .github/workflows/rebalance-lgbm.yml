name: Paper Trade Rebalance (LightGBM)

on:
  schedule:
    # 14:30 UTC = 10:30 ET (EDT) / 09:30 ET (EST), ~1h after the open (EDT).
    # Moved earlier from 18:00 UTC: GH Actions scheduler delay (often 2h+) was
    # pushing the run to ~16:00-16:28 ET, at/after the 16:00 ET close, so
    # rebalance orders missed fills. At 14:30 UTC even a 2h delay lands the run
    # mid-session with hours of runway before close.
    - cron: '30 14 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'live'
        type: choice
        options:
          - live
          - dry-run
          - status

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      # Restore state from previous runs
      - name: Restore trade state
        uses: actions/cache/restore@v4
        with:
          path: logs/paper_trade_lgbm_state.json
          key: trade-state-lgbm-${{ github.run_number }}
          restore-keys: trade-state-lgbm-

      - name: Ensure logs directory
        run: mkdir -p logs

      # Determine run flags
      - name: Set run flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            MODE="live"
          fi
          case "$MODE" in
            dry-run) echo "args=--dry-run" >> "$GITHUB_OUTPUT" ;;
            status)  echo "args=--status"  >> "$GITHUB_OUTPUT" ;;
            *)       echo "args="          >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run paper_trade_lgbm.py
        run: python paper_trade_lgbm.py ${{ steps.flags.outputs.args }}
        env:
          PYTHONPATH: .
          ALPACA_LGBM_API_KEY: ${{ secrets.ALPACA_LGBM_API_KEY }}
          ALPACA_LGBM_SECRET_KEY: ${{ secrets.ALPACA_LGBM_SECRET_KEY }}

      # Persist state for next run
      - name: Save trade state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/paper_trade_lgbm_state.json
          key: trade-state-lgbm-${{ github.run_number }}

      # Commit updated trade logs and state back to repo
      - name: Commit trade logs
        if: github.event.inputs.mode != 'dry-run' && github.event.inputs.mode != 'status'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f logs/paper_trade_lgbm_state.json logs/trade_events.jsonl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update lgbm trade state after rebalance [skip ci]"
            git push
          fi
