name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt pytest

      # Tests run fully offline against synthetic fixtures (tests/conftest.py)
      - run: pytest tests/ -q
        env:
          PYTHONPATH: .
