  name: Update Dashboard

  on:
    schedule:
      - cron: '0 21 * * 1-5'
    push:
      branches: [main]
      paths:
        - 'generate_site.py'
        - 'generate_site_lgbm.py'
        - 'site/**'
        - 'quant/**'
        - 'config.yaml'
    workflow_dispatch:

  permissions:
    contents: write
    pages: write

  concurrency:
    group: dashboard-${{ github.repository }}
    cancel-in-progress: false

  jobs:
    generate:
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      timeout-minutes: 90
      steps:
        - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
          with:
            python-version: '3.12'
            cache: 'pip'
        - run: pip install --require-hashes -r requirements.lock
        - run: python generate_site.py
          env:
            PYTHONPATH: .
            ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
            ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        - run: python generate_site_lgbm.py
          env:
            PYTHONPATH: .
            ALPACA_LGBM_API_KEY: ${{ secrets.ALPACA_LGBM_API_KEY }}
            ALPACA_LGBM_SECRET_KEY: ${{ secrets.ALPACA_LGBM_SECRET_KEY }}
        - uses: peaceiris/actions-gh-pages@329bcc8f12caed2cefe5a5b80781499a6f3b361b # v4
          with:
            github_token: ${{ secrets.GITHUB_TOKEN }}
            publish_dir: ./site
            publish_branch: gh-pages
            force_orphan: true
