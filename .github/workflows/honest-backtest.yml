name: ETF Robustness Control

# Runs the same signal engine on a broad ETF control universe.  This is a useful
# cross-asset robustness check, but it is not an estimate of survivorship bias:
# ETFs change the opportunity set, correlation and volatility structure.

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Backtest start date (YYYY-MM-DD)'
        required: false
        default: '2007-01-01'
      end:
        description: 'Backtest end date (YYYY-MM-DD, blank = today)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install --require-hashes -r requirements.lock

      - name: Run ETF robustness backtest
        id: bt
        env:
          PYTHONPATH: .
        run: |
          END_ARG=""
          if [ -n "${{ github.event.inputs.end }}" ]; then
            END_ARG="--end ${{ github.event.inputs.end }}"
          fi
          set -o pipefail
          python run.py -c config_etf.yaml backtest \
            --start "${{ github.event.inputs.start }}" $END_ARG \
            | tee backtest_output.txt

      - name: Publish result to job summary
        if: always()
        run: |
          {
            echo "# ETF robustness-control backtest"
            echo ""
            echo "Same momentum engine as the main strategy, run on an ETF control universe"
            echo "(\`config_etf.yaml\`). Window: **${{ github.event.inputs.start }} → ${{ github.event.inputs.end || 'today' }}**."
            echo ""
            echo '```'
            cat backtest_output.txt 2>/dev/null || echo "(no output captured)"
            echo '```'
            echo ""
            echo "> Robustness control only: the ETF result cannot quantify the stock"
            echo "> strategy's survivorship bias because the asset universe and risk"
            echo "> structure are different. Use PIT constituents + delisting returns"
            echo "> for a bias-reduced stock backtest."
          } >> "$GITHUB_STEP_SUMMARY"
