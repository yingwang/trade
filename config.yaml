  benchmark: SPY

data:
  lookback_years: 5
  frequency: 1d  # daily bars

signals:
  # Momentum — 3m/6m/12m; dropped 1m (too noisy)
  momentum_windows: [42, 126, 252]  # 2m, 6m, 12m — faster 42d captures quicker rotations
  # Mean reversion — used as blowoff filter (zscore > 4 → penalize)
  mean_reversion_window: 20
  mean_reversion_zscore_threshold: 4.0  # relaxed from 3.0 — don't filter strong momentum
  # Trend — used as filter: price < 200d SMA → score *= 0.5
  sma_short: 50
  sma_long: 200
  # Volatility
  volatility_window: 63
  # Industry-neutral z-scoring: rank within sector before combining
  industry_neutral: true           # z-score within each sector to prevent tech crowding
  winsorize_clip: 3.0              # clip extreme z-scores to [-3, 3] before composite
  # Factor weights (must sum to 1.0) — trend/mean_reversion now applied as filters, not scored
  # 因子权重（必须加总为 1.0）— trend 和 mean_reversion 改为过滤器，不参与评分
  factor_weights:
    momentum: 0.80         # pure momentum — primary alpha, no look-ahead bias
    quality: 0.00          # disabled — yfinance .info has look-ahead bias
    volatility: 0.00       # removed — low-vol tilt fights momentum in tech bull markets
    value: 0.00            # disabled — same look-ahead bias as quality
    mean_reversion: 0.00   # disabled as scored factor; used as blowoff filter instead
    trend: 0.00            # disabled as scored factor; used as 200d SMA filter instead

portfolio:
  max_positions: 12            # concentrated: top 12 conviction picks
  max_position_weight: 0.12   # 12% max — let top picks express
  min_position_weight: 0.03   # 3% min — meaningful position or don't hold
  target_volatility: 0.22     # 22% — nearly fully invested, minimal cash drag
  rebalance_frequency_days: 14  # biweekly — fresher momentum signals
  transaction_cost_bps: 10    # 10 basis points per trade

risk:
  max_drawdown_limit: 0.25     # 25% — accept more drawdown for growth
  max_sector_weight: 0.50      # 50% — let tech run when momentum says so
  stop_loss_pct: 0.15          # 15% — wider to avoid whipsawing volatile winners

leverage:
  max_leverage: 2.0              # Alpaca margin 最高 2x
  regime_spy_vol_window: 63      # 63-day SPY realized vol for regime detection
  regime_thresholds:             # SPY annualized vol thresholds
    low: 0.12                    # < 12% = calm market
    high: 0.20                   # > 20% = stressed market
  regime_leverage_caps:          # max leverage per regime
    low_vol: 1.8                 # calm → up to 1.8x (reduced from 2.0)
    normal: 1.5                  # normal → up to 1.5x (up from 1.3)
    high_vol: 0.8                # stressed → de-leverage to 0.8x (up from 0.7)
  margin_annual_rate: 0.06       # annual margin interest rate (for backtest)

safety:
  max_single_order_value: 50000     # $50k max per order
  max_single_order_shares: 10000    # 10k shares max per order
  max_daily_trade_value: 500000     # $500k max daily turnover
  max_daily_loss: 25000             # $25k daily loss limit
  max_adv_fraction: 0.01            # max 1% of average daily volume
  min_price: 1.0                    # reject penny stocks
  max_position_pct_of_portfolio: 0.15  # 15% max single position
  require_paper_mode: true          # block live trading unless explicitly overridden

backtest:
  start_date: "2016-01-01"
  end_date: null  # null = today
  initial_capital: 1000000
  slippage_bps: 5
